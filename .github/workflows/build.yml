name: Build NTRWabot

# CI on every push/PR + release on version tags
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  RACK_SDK_VERSION: 2.6.6
  PLUGIN_SLUG: NTRWabot

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel  # Intel Mac (macos-13 runners retired)
            platform: mac-x64
            arch: x64
          - os: macos-14        # Apple Silicon
            platform: mac-arm64
            arch: arm64
          - os: ubuntu-22.04
            platform: lin-x64
            arch: x64
          - os: windows-latest
            platform: win-x64
            arch: x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── macOS / Linux: download SDK and build ──────────────────────────────

      - name: Download Rack SDK (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL \
            "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-${{ matrix.platform }}.zip" \
            -o RackSDK.zip
          unzip -q RackSDK.zip -d .
          echo "RACK_DIR=$GITHUB_WORKSPACE/Rack-SDK" >> $GITHUB_ENV

      - name: Build (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: make RACK_DIR=$RACK_DIR -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Package (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/${{ env.PLUGIN_SLUG }}
          cp plugin.* dist/${{ env.PLUGIN_SLUG }}/
          cp -R res   dist/${{ env.PLUGIN_SLUG }}/
          cd dist
          zip -r -9 ../${{ env.PLUGIN_SLUG }}-${{ matrix.platform }}.vcvplugin ${{ env.PLUGIN_SLUG }}/

      # ── Windows: MSYS2 + MinGW-w64 ─────────────────────────────────────────

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-jq
            unzip
            curl
            zip

      - name: Download Rack SDK (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          curl -fsSL \
            "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-${{ matrix.platform }}.zip" \
            -o RackSDK.zip
          unzip -q RackSDK.zip -d .

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make RACK_DIR=$(cygpath -u "$GITHUB_WORKSPACE")/Rack-SDK -j$(nproc)

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p dist/${{ env.PLUGIN_SLUG }}
          cp plugin.* dist/${{ env.PLUGIN_SLUG }}/
          cp -R res   dist/${{ env.PLUGIN_SLUG }}/
          cd dist
          zip -r -9 ../${{ env.PLUGIN_SLUG }}-${{ matrix.platform }}.vcvplugin ${{ env.PLUGIN_SLUG }}/

      # ── Upload artifact ─────────────────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_SLUG }}-${{ matrix.platform }}
          path: ${{ env.PLUGIN_SLUG }}-${{ matrix.platform }}.vcvplugin
          retention-days: 30

  # ── Create GitHub Release when triggered by a tag ──────────────────────────

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nevertrustrobots Wabot ${{ github.ref_name }}"
          draft: true
          generate_release_notes: true
          body: |
            ## Nevertrustrobots Wabot ${{ github.ref_name }}

            VCV Rack module that opens an HTTP bridge on port 7777,
            enabling Claude AI to read and control your patch in real time.

            ### Installation
            Download the `.vcvplugin` for your platform, place it in your Rack2 plugins folder and restart VCV Rack:
            - **macOS:** `~/Documents/Rack2/plugins/`
            - **Windows:** `%LOCALAPPDATA%\Rack2\plugins\`
            - **Linux:** `~/.Rack2/plugins/`

            ### MCP Server + Claude Skill (required to use with Claude)
            The module alone starts the server. To connect it to Claude AI
            you need the **MCP Server and the NTR_Wabot Skill** — available exclusively at:

            **https://www.patreon.com/c/nevertrustrobots**

          files: artifacts/*.vcvplugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
